# Crop profiles for Japan first-screening suitability scoring.
# These values are calibrated for the Chiba/Sosa region and its high annual precipitation.
# Units:
# - temperature: Celsius
# - rainfall: mm/year
# - slope: degrees
# - soil_org_carbon: proxy scale from OpenLandMap or local data

lemon:
  display_name: Lemon
  product: Fresh lemons / juice
  sun_requirement: Full sun
  shade_tolerance: Low
  agrivoltaics_note: Lemon is a high-light crop. Solar sharing requires high panel clearance and wide spacing (e.g., 30-40% shading max).
  weights:
    soil: 0.30
    moisture: 0.20
    heat: 0.20
    vegetation: 0.15
    terrain: 0.10
    land_use: 0.05
  thresholds:
    ph: [5.5, 6.0, 7.0, 7.8]
    soil_org_carbon: [10, 25]
    ndmi: [-0.15, -0.05, 0.35, 0.50]
    mean_temp_c: [12.0, 15.0, 22.0, 28.0]
    annual_rain_mm: [800, 1000, 1600, 2200]
    ndvi: [0.25, 0.35, 0.65, 0.85]
    slope_deg_max: 15

apple:
  display_name: Apple
  product: Fresh apples
  sun_requirement: Full sun
  shade_tolerance: Low
  agrivoltaics_note: Apple orchards require high light for fruit coloring. Solar sharing should use thin/bifacial vertical panels or high row spacing.
  weights:
    soil: 0.30
    moisture: 0.20
    heat: 0.20
    vegetation: 0.15
    terrain: 0.10
    land_use: 0.05
  thresholds:
    ph: [5.5, 6.0, 7.0, 7.5]
    soil_org_carbon: [12, 30]
    ndmi: [-0.15, 0.00, 0.40, 0.55]
    mean_temp_c: [7.0, 9.0, 14.0, 18.0]
    annual_rain_mm: [600, 800, 1400, 1800]
    ndvi: [0.20, 0.30, 0.70, 0.85]
    slope_deg_max: 20

olive:
  display_name: Olive
  product: Olive oil
  sun_requirement: Full sun
  shade_tolerance: Low to moderate
  agrivoltaics_note: Good compatibility if panels are spaced widely to allow 60%+ light transmission.
  weights:
    soil: 0.30
    moisture: 0.20
    heat: 0.20
    vegetation: 0.15
    terrain: 0.10
    land_use: 0.05
  thresholds:
    ph: [5.5, 6.0, 8.0, 8.5]
    soil_org_carbon: [8, 25]
    ndmi: [-0.25, -0.10, 0.25, 0.45]
    mean_temp_c: [10.0, 14.0, 25.0, 32.0]
    annual_rain_mm: [500, 800, 1500, 2000]
    ndvi: [0.12, 0.22, 0.55, 0.80]
    slope_deg_max: 18

soybean:
  display_name: Soybean
  product: Soybeans / Tofu / Edamame
  sun_requirement: Full sun
  shade_tolerance: Moderate
  agrivoltaics_note: Soybean is successfully grown under solar panels in Japan. It tolerates partial shade (up to 30-40% reduction in light) with minor yield impacts.
  weights:
    soil: 0.30
    moisture: 0.20
    heat: 0.20
    vegetation: 0.10
    terrain: 0.15
    land_use: 0.05
  thresholds:
    ph: [5.8, 6.2, 7.2, 7.8]
    soil_org_carbon: [10, 30]
    ndmi: [-0.10, 0.05, 0.45, 0.60]
    mean_temp_c: [12.0, 18.0, 26.0, 32.0]
    annual_rain_mm: [700, 950, 1650, 2200]
    ndvi: [0.25, 0.35, 0.75, 0.90]
    slope_deg_max: 10
